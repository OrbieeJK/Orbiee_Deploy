name: Deploy Orbiee

on:
  repository_dispatch:
    types: [trigger-orbiee]

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.env.outputs.branch }}
      region: ${{ steps.env.outputs.region }}
      artifact_registry_region: ${{ steps.env.outputs.artifact_registry_region }}
      artifact_registry_repo: ${{ steps.env.outputs.artifact_registry_repo }}
      cloud_run_service: ${{ steps.env.outputs.cloud_run_service }}
      cloud_worker_service: ${{ steps.env.outputs.cloud_worker_service }}
      image_name: ${{ steps.env.outputs.image_name }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.repository }}
          ref: ${{ github.event.client_payload.ref }}
          token: ${{ secrets.PRIVATETOKENPULL }}

      - name: Determine Environment
        id: env
        run: |
          BRANCH="${{ github.event.client_payload.ref }}"
          REPO="${{ github.event.client_payload.repository }}"

          if [[ "$REPO" == "OrbieeJK/Orbiee_Backend" ]]; then

            case "$BRANCH" in
              rearchitecture)
                CLOUD_RUN_SERVICE="orbiee-backend-dev"
                IMAGE_NAME="orbiee-backend-dev"
                CLOUD_WORKER_SERVICE="orbiee-worker-dev"
                ENV="dev"
                ;;
                
              rearchitecture_demo)
                CLOUD_RUN_SERVICE="orbiee-backend"
                IMAGE_NAME="orbiee-backend"
                CLOUD_WORKER_SERVICE="orbiee-worker"
                ENV="demo"
                ;;
                
              *)
                echo "Unsupported backend branch: $BRANCH"
                exit 1
                ;;
            esac

          else

            case "$BRANCH" in
              dev|rearchitecture)
                CLOUD_RUN_SERVICE="orbiee-dev"
                IMAGE_NAME="orbiee-dev"
                ;;
                
              demov1|rearchitecture_demo)
                CLOUD_RUN_SERVICE="orbiee"
                IMAGE_NAME="orbiee-demo"
                ;;
                
              *)
                echo "Unsupported frontend branch: $BRANCH"
                exit 1
                ;;
            esac

          fi

          REGION="us-central1"
          ARTIFACT_REGISTRY_REGION="us-central1"
          ARTIFACT_REGISTRY_REPO="orbiee"

          echo "branch=$BRANCH"                                         >> $GITHUB_OUTPUT
          echo "region=$REGION"                                         >> $GITHUB_OUTPUT
          echo "artifact_registry_region=$ARTIFACT_REGISTRY_REGION"    >> $GITHUB_OUTPUT
          echo "artifact_registry_repo=$ARTIFACT_REGISTRY_REPO"        >> $GITHUB_OUTPUT
          echo "cloud_run_service=$CLOUD_RUN_SERVICE"                   >> $GITHUB_OUTPUT
          echo "cloud_worker_service=$CLOUD_WORKER_SERVICE"             >> $GITHUB_OUTPUT
          echo "image_name=$IMAGE_NAME"                                 >> $GITHUB_OUTPUT
          echo "env=$ENV"                                               >> $GITHUB_OUTPUT

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_SAKEY }}"

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: retail-jkommerce-poc

  deploy-backend:
    if: ${{ github.event.client_payload.repository == 'OrbieeJK/Orbiee_Backend' }}
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.repository }}
          ref: ${{ github.event.client_payload.ref }}
          token: ${{ secrets.PRIVATETOKENPULL }}
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_SAKEY }}"

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: retail-jkommerce-poc

      - name: Check for Changes
        id: check
        run: |
          git fetch --tags 2>/dev/null || true
          BRANCH="${{ needs.setup.outputs.branch }}"
          CHANGED=""

          if git rev-parse --verify "origin/$BRANCH" >/dev/null 2>&1; then
            ORIGIN_SHA=$(git rev-parse "origin/$BRANCH")
            HEAD_SHA=$(git rev-parse HEAD)

            if [[ "$ORIGIN_SHA" == "$HEAD_SHA" ]]; then
              CHANGED="true"
            else
              CHANGED=$(git diff --name-only "origin/$BRANCH" HEAD | \
                grep -vE '^(\.github/|README|WEBRTC_|cloudbuild)' || true)
            fi
          else
            CHANGED="true"
          fi

          if [[ -n "$CHANGED" ]]; then
            echo "✅ Changes detected, will deploy"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "⏭️  No relevant changes, skipping"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Set Image Tag
        if: steps.check.outputs.has_changes == 'true'
        run: |
          TAG=$(date +%Y%m%d-%H%M%S)
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        if: steps.check.outputs.has_changes == 'true'
        run: |
          BRANCH="${{ needs.setup.outputs.branch }}"
          AR_REGION="${{ needs.setup.outputs.artifact_registry_region }}"
          AR_REPO="${{ needs.setup.outputs.artifact_registry_repo }}"
          IMAGE_NAME="${{ needs.setup.outputs.image_name }}"

          docker build \
            -f apps/orbiee_core/Dockerfile \
            -t ${AR_REGION}-docker.pkg.dev/retail-jkommerce-poc/${AR_REPO}/${IMAGE_NAME}:${TAG} \
            .

          gcloud auth configure-docker ${AR_REGION}-docker.pkg.dev --quiet
          docker push ${AR_REGION}-docker.pkg.dev/retail-jkommerce-poc/${AR_REPO}/${IMAGE_NAME}:${TAG}

      - name: Deploy to Cloud Run
        if: steps.check.outputs.has_changes == 'true'
        run: |
          CLOUD_RUN_SERVICE="${{ needs.setup.outputs.cloud_run_service }}"
          CLOUD_WORKER_SERVICE="${{ needs.setup.outputs.cloud_worker_service }}"
          REGION="${{ needs.setup.outputs.region }}"
          AR_REGION="${{ needs.setup.outputs.artifact_registry_region }}"
          AR_REPO="${{ needs.setup.outputs.artifact_registry_repo }}"
          IMAGE_NAME="${{ needs.setup.outputs.image_name }}"
          if [ "$ENV" = "dev" ]; then
            SECRETS="DB_CONFIG=orbiee-db-config:latest,API_KEYS_JSON=orbiee-api-keys:latest,REDIS_URL=orbiee-redis-url:latest"
          else
            SECRETS="DB_CONFIG=orbiee-db-config-demo:latest,API_KEYS_JSON=orbiee-api-keys:latest,REDIS_URL=orbiee-demo-redis-url:latest"
          fi

          gcloud run deploy ${CLOUD_RUN_SERVICE} \
            --image=${AR_REGION}-docker.pkg.dev/retail-jkommerce-poc/${AR_REPO}/${IMAGE_NAME}:${TAG} \
            --platform=managed \
            --region=${REGION} \
            --set-secrets=${SECRETS} \
            --set-env-vars="ORBIEE_GCP_PROJECT=retail-jkommerce-poc,ORBIEE_DEBUG=false,VERTEX_PROJECT=218142584790,RETAIL_PLACEMENT=projects/218142584790/locations/global/catalogs/default_catalog/servingConfigs/recommenedfy,RETAIL_BRANCH=projects/218142584790/locations/global/catalogs/default_catalog/branches/2,RETAIL_SEARCH_PLACEMENT=projects/218142584790/locations/global/catalogs/default_catalog/placements/default_search" \
            --quiet

          gcloud run deploy ${CLOUD_WORKER_SERVICE} \
            --image=${AR_REGION}-docker.pkg.dev/retail-jkommerce-poc/${AR_REPO}/${IMAGE_NAME}:${TAG} \
            --platform=managed \
            --region=${REGION} \
            --set-secrets=${SECRETS} \
            --set-env-vars="ORBIEE_GCP_PROJECT=retail-jkommerce-poc,ORBIEE_DEBUG=false,VERTEX_PROJECT=218142584790,RETAIL_PLACEMENT=projects/218142584790/locations/global/catalogs/default_catalog/servingConfigs/recommenedfy,RETAIL_BRANCH=projects/218142584790/locations/global/catalogs/default_catalog/branches/2,RETAIL_SEARCH_PLACEMENT=projects/218142584790/locations/global/catalogs/default_catalog/placements/default_search" \
            --command=python \
            --args=-m,orbiee.workers.session_worker \
            --min-instances=1 \
            --max-instances=1 \
            --quiet

          gcloud run services add-iam-policy-binding ${CLOUD_RUN_SERVICE} \
            --region=${REGION} \
            --member="serviceAccount:218142584790-compute@developer.gserviceaccount.com" \
            --role="roles/run.invoker"

          gcloud run services add-iam-policy-binding ${CLOUD_WORKER_SERVICE} \
            --region=${REGION} \
            --member="serviceAccount:218142584790-compute@developer.gserviceaccount.com" \
            --role="roles/run.invoker"

          echo ""
          echo "✅ Deployed: $CLOUD_RUN_SERVICE"
          echo "🌍 URL: $(gcloud run services describe ${CLOUD_RUN_SERVICE} \
            --region=${REGION} --format='value(status.url)')"

  deploy-frontend:
    if: ${{ github.event.client_payload.repository == 'OrbieeJK/Orbiee_FrontEnd' }}
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.repository }}
          ref: ${{ github.event.client_payload.ref }}
          token: ${{ secrets.PRIVATETOKENPULL }}
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_SAKEY }}"

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: retail-jkommerce-poc

      - name: Check for Changes
        id: check
        run: |
          git fetch --tags 2>/dev/null || true
          BRANCH="${{ needs.setup.outputs.branch }}"
          CHANGED=""

          if git rev-parse --verify "origin/$BRANCH" >/dev/null 2>&1; then
            ORIGIN_SHA=$(git rev-parse "origin/$BRANCH")
            HEAD_SHA=$(git rev-parse HEAD)

            if [[ "$ORIGIN_SHA" == "$HEAD_SHA" ]]; then
              CHANGED="true"
            else
              CHANGED=$(git diff --name-only "origin/$BRANCH" HEAD | \
                grep -vE '^(\.github/|README|WEBRTC_|cloudbuild)' || true)
            fi
          else
            CHANGED="true"
          fi

          if [[ -n "$CHANGED" ]]; then
            echo "✅ Changes detected, will deploy"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "⏭️  No relevant changes, skipping"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Set Image Tag
        if: steps.check.outputs.has_changes == 'true'
        run: |
          TAG=$(date +%Y%m%d-%H%M%S)
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        if: steps.check.outputs.has_changes == 'true'
        run: |
          BRANCH="${{ needs.setup.outputs.branch }}"
          AR_REGION="${{ needs.setup.outputs.artifact_registry_region }}"
          AR_REPO="${{ needs.setup.outputs.artifact_registry_repo }}"
          IMAGE_NAME="${{ needs.setup.outputs.image_name }}"

          case "$BRANCH" in
            dev|rearchitecture)  REACT_APP_ENV="dev" ;;
            demov1) REACT_APP_ENV="demov1"        ;;
          esac

          docker build \
            --build-arg REACT_APP_ENV=${REACT_APP_ENV} \
            -t ${AR_REGION}-docker.pkg.dev/retail-jkommerce-poc/${AR_REPO}/${IMAGE_NAME}:${TAG} \
            .

          gcloud auth configure-docker ${AR_REGION}-docker.pkg.dev --quiet
          docker push ${AR_REGION}-docker.pkg.dev/retail-jkommerce-poc/${AR_REPO}/${IMAGE_NAME}:${TAG}

      - name: Deploy to Cloud Run
        if: steps.check.outputs.has_changes == 'true'
        run: |
          CLOUD_RUN_SERVICE="${{ needs.setup.outputs.cloud_run_service }}"
          REGION="${{ needs.setup.outputs.region }}"
          AR_REGION="${{ needs.setup.outputs.artifact_registry_region }}"
          AR_REPO="${{ needs.setup.outputs.artifact_registry_repo }}"
          IMAGE_NAME="${{ needs.setup.outputs.image_name }}"

          gcloud run deploy ${CLOUD_RUN_SERVICE} \
            --image=${AR_REGION}-docker.pkg.dev/retail-jkommerce-poc/${AR_REPO}/${IMAGE_NAME}:${TAG} \
            --platform=managed \
            --region=${REGION} \
            --allow-unauthenticated \
            --quiet

          echo ""
          echo "✅ Deployed: $CLOUD_RUN_SERVICE"
          echo "🌍 URL: $(gcloud run services describe ${CLOUD_RUN_SERVICE} \
            --region=${REGION} --format='value(status.url)')"
