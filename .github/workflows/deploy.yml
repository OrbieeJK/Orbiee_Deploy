name: Deploy Orbiee Frontend

on:
  repository_dispatch:
    types: [trigger-orbiee]

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.env.outputs.branch }}
      env: ${{ steps.env.outputs.env }}
      region: ${{ steps.env.outputs.region }}
      artifact_registry_region: ${{ steps.env.outputs.artifact_registry_region }}
      artifact_registry_repo: ${{ steps.env.outputs.artifact_registry_repo }}
      cloud_run_service: ${{ steps.env.outputs.cloud_run_service }}
      image_name: ${{ steps.env.outputs.image_name }}
      force_deploy: ${{ steps.env.outputs.force_deploy }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.repository }}
          ref: ${{ github.event.client_payload.ref || 'development' }}
          token: ${{ secrets.PRIVATETOKENPULL }}

      - name: Determine Environment
        id: env
        run: |
          BRANCH="${{ github.event.client_payload.ref || 'development' }}"
          FORCE_DEPLOY="${{ github.event.client_payload.force_deploy || 'false' }}"

          case "$BRANCH" in
            development)
              ENV="development"
              CLOUD_RUN_SERVICE="orbiee-dev"
              IMAGE_NAME="orbiee-development"
              ;;
            demo)
              ENV="demo"
              CLOUD_RUN_SERVICE="orbiee-demo"
              IMAGE_NAME="orbiee-demo"
              ;;
            *)
              echo "❌ Unknown branch: $BRANCH — aborting"
              exit 1
              ;;
          esac

          REGION="us-central1"
          ARTIFACT_REGISTRY_REGION="us-central1"
          ARTIFACT_REGISTRY_REPO="orbiee"

          echo "branch=$BRANCH"                                         >> $GITHUB_OUTPUT
          echo "env=$ENV"                                               >> $GITHUB_OUTPUT
          echo "region=$REGION"                                         >> $GITHUB_OUTPUT
          echo "artifact_registry_region=$ARTIFACT_REGISTRY_REGION"    >> $GITHUB_OUTPUT
          echo "artifact_registry_repo=$ARTIFACT_REGISTRY_REPO"        >> $GITHUB_OUTPUT
          echo "cloud_run_service=$CLOUD_RUN_SERVICE"                   >> $GITHUB_OUTPUT
          echo "image_name=$IMAGE_NAME"                                 >> $GITHUB_OUTPUT
          echo "force_deploy=$FORCE_DEPLOY"                             >> $GITHUB_OUTPUT

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_SAKEY }}"

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: retail-jkommerce-poc

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.repository }}
          ref: ${{ github.event.client_payload.ref || 'development' }}
          token: ${{ secrets.PRIVATETOKENPULL }}
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_SAKEY }}"

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: retail-jkommerce-poc

      - name: Check for Changes
        id: check
        run: |
          git fetch --tags 2>/dev/null || true
          BRANCH="${{ needs.setup.outputs.branch }}"
          FORCE_DEPLOY="${{ needs.setup.outputs.force_deploy }}"
          CHANGED=""

          if [[ "$FORCE_DEPLOY" == "true" ]]; then
            echo "🚨 Force deploy enabled"
            CHANGED="true"
          elif git rev-parse --verify "origin/$BRANCH" >/dev/null 2>&1; then
            ORIGIN_SHA=$(git rev-parse "origin/$BRANCH")
            HEAD_SHA=$(git rev-parse HEAD)

            if [[ "$ORIGIN_SHA" == "$HEAD_SHA" ]]; then
              CHANGED="true"
            else
              CHANGED=$(git diff --name-only "origin/$BRANCH" HEAD | \
                grep -vE '^(\.github/|README|WEBRTC_|cloudbuild)' || true)
            fi
          else
            CHANGED="true"
          fi

          if [[ -n "$CHANGED" ]]; then
            echo "✅ Changes detected, will deploy"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "⏭️  No relevant changes, skipping"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Set Image Tag
        if: steps.check.outputs.has_changes == 'true'
        run: |
          TAG=$(date +%Y%m%d-%H%M%S)
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        if: steps.check.outputs.has_changes == 'true'
        run: |
          BRANCH="${{ needs.setup.outputs.branch }}"
          AR_REGION="${{ needs.setup.outputs.artifact_registry_region }}"
          AR_REPO="${{ needs.setup.outputs.artifact_registry_repo }}"
          IMAGE_NAME="${{ needs.setup.outputs.image_name }}"

          # Matches your Dockerfile ARG REACT_APP_ENV
          case "$BRANCH" in
            development) REACT_APP_ENV="development" ;;
            demo)        REACT_APP_ENV="demo"        ;;
            *)           REACT_APP_ENV="development" ;;
          esac

          docker build \
            --build-arg REACT_APP_ENV=${REACT_APP_ENV} \
            -t ${AR_REGION}-docker.pkg.dev/retail-jkommerce-poc/${AR_REPO}/${IMAGE_NAME}:${TAG} \
            .

          gcloud auth configure-docker ${AR_REGION}-docker.pkg.dev --quiet
          docker push ${AR_REGION}-docker.pkg.dev/retail-jkommerce-poc/${AR_REPO}/${IMAGE_NAME}:${TAG}

      - name: Deploy to Cloud Run
        if: steps.check.outputs.has_changes == 'true'
        run: |
          CLOUD_RUN_SERVICE="${{ needs.setup.outputs.cloud_run_service }}"
          REGION="${{ needs.setup.outputs.region }}"
          AR_REGION="${{ needs.setup.outputs.artifact_registry_region }}"
          AR_REPO="${{ needs.setup.outputs.artifact_registry_repo }}"
          IMAGE_NAME="${{ needs.setup.outputs.image_name }}"

          gcloud run deploy ${CLOUD_RUN_SERVICE} \
            --image=${AR_REGION}-docker.pkg.dev/retail-jkommerce-poc/${AR_REPO}/${IMAGE_NAME}:${TAG} \
            --platform=managed \
            --region=${REGION} \
            --allow-unauthenticated \
            --quiet

          echo ""
          echo "✅ Deployed: $CLOUD_RUN_SERVICE"
          echo "🌍 URL: $(gcloud run services describe ${CLOUD_RUN_SERVICE} \
            --region=${REGION} --format='value(status.url)')"
